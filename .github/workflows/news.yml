name: Update News

on:
  schedule:
    - cron: "0 */3 * * *"   # 3時間ごと
  workflow_dispatch:         # 手動実行も可

# git push するために書き込み権限が必要（ChatGPT版はこれが無く push に失敗する）
permissions:
  contents: write

# 実行が重なって競合しないように
concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # ← ハングして後続実行が詰まるのを防ぐ

    # scripts / data が insights/ 配下にあるため、以降のrunはこのディレクトリで実行
    defaults:
      run:
        working-directory: insights

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"   # ← ChatGPT版の "40" は存在しないバージョン

      - run: npm install

      - run: node scripts/fetch-news.js

      - name: Commit news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news_updated.json
          git commit -m "update news [skip ci]" || echo "no changes"
          git pull --rebase --autostash origin main
          git push
